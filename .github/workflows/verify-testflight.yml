name: Verify TestFlight builds

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query App Store Connect for builds
        env:
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          node -e '
            const crypto = require("crypto");
            const key = Buffer.from(process.env.KEY_B64, "base64").toString("utf8");
            const b64u = o => Buffer.from(JSON.stringify(o)).toString("base64url");
            const now = Math.floor(Date.now() / 1000);
            const unsigned = b64u({ alg: "ES256", kid: process.env.KEY_ID, typ: "JWT" })
              + "." + b64u({ iss: process.env.ISSUER, iat: now, exp: now + 900, aud: "appstoreconnect-v1" });
            const sig = crypto.sign("sha256", Buffer.from(unsigned), { key, dsaEncoding: "ieee-p1363" }).toString("base64url");
            const jwt = unsigned + "." + sig;
            const get = async path => {
              const r = await fetch("https://api.appstoreconnect.apple.com" + path, { headers: { Authorization: "Bearer " + jwt } });
              const j = await r.json();
              if (!r.ok) throw new Error(r.status + " " + JSON.stringify(j).slice(0, 400));
              return j;
            };
            (async () => {
              const apps = await get("/v1/apps?filter[bundleId]=com.lukeholder.babynamefinder");
              if (!apps.data.length) { console.log("APP NOT FOUND in App Store Connect"); process.exit(1); }
              const app = apps.data[0];
              console.log("APP:", app.id, app.attributes.name, app.attributes.bundleId);
              const builds = await get("/v1/builds?filter[app]=" + app.id + "&sort=-uploadedDate&limit=10&fields[builds]=version,processingState,uploadedDate,expired");
              if (!builds.data.length) { console.log("NO BUILDS uploaded"); process.exit(1); }
              for (const b of builds.data) {
                const a = b.attributes;
                console.log("BUILD version=" + a.version, "state=" + a.processingState, "uploaded=" + a.uploadedDate, "expired=" + a.expired);
              }
            })().catch(e => { console.error(e.message); process.exit(1); });
          '
